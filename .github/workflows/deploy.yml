name: Deploy Company Profile CMS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Create directory if it doesn't exist
            mkdir -p ${{ secrets.PROJECT_PATH }}
            cd ${{ secrets.PROJECT_PATH }}
            
            # Clone repository if not already cloned, otherwise pull changes
            if [ ! -d ".git" ]; then
              git clone https://github.com/Fdlnahmd/nexuscorp.git .
            else
              git pull origin main
            fi
            
            echo "${{ secrets.ENV_FILE }}" > .env
            echo "${{ secrets.BACKEND_ENV }}" > backend/.env
            echo "${{ secrets.FRONTEND_ENV }}" > frontend/.env
            
            docker compose down
            docker compose up -d --build


            
            # Wait for containers to initialize
            sleep 10
            
            docker compose exec -T backend composer install --no-interaction --prefer-dist --optimize-autoloader
            docker compose exec -T backend php artisan migrate --force
            docker compose exec -T backend php artisan storage:link --force
            docker compose exec -T backend php artisan optimize:clear




