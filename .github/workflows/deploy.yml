name: Deploy Company Profile CMS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Create directory if it doesn't exist
            mkdir -p ${{ secrets.PROJECT_PATH }}
            cd ${{ secrets.PROJECT_PATH }}
            
            # Clone repository if not already cloned, otherwise pull changes
            if [ ! -d ".git" ]; then
              git clone https://github.com/Fdlnahmd/nexuscorp.git .
            else
              git pull origin main
            fi
            
            if [ -n "${{ secrets.ENV_FILE }}" ]; then
              printf '%s\n' "${{ secrets.ENV_FILE }}" > .env
            else
              echo "ENV_FILE secret is empty; keeping existing .env"
            fi

            if [ -n "${{ secrets.BACKEND_ENV }}" ]; then
              printf '%s\n' "${{ secrets.BACKEND_ENV }}" > backend/.env
            else
              echo "BACKEND_ENV secret is empty; keeping existing backend/.env"
            fi

            if [ -n "${{ secrets.FRONTEND_ENV }}" ]; then
              printf '%s\n' "${{ secrets.FRONTEND_ENV }}" > frontend/.env
            else
              echo "FRONTEND_ENV secret is empty; keeping existing frontend/.env"
            fi
            
            docker compose down
            docker compose up -d --build


            
            # Wait for containers to initialize
            sleep 15
            
            docker compose exec -T backend composer install --no-interaction --prefer-dist --optimize-autoloader
            
            # Clear configuration cache to force Laravel to read new .env values
            docker compose exec -T backend php artisan config:clear
            
            docker compose exec -T backend php artisan migrate --force
            docker compose exec -T backend php artisan storage:link --force
            docker compose exec -T backend php artisan optimize:clear





