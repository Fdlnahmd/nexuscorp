version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cms_mysql
    restart: unless-stopped
    tty: true
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-business_cms}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-root}"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cms_network

  # Redis Cache Layer
  redis:
    image: redis:alpine
    container_name: cms_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - cms_network


  # Laravel API Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms_backend
    restart: unless-stopped
    tty: true
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - cms_network

  # Nginx Web Server for Laravel
  webserver:
    image: nginx:alpine
    container_name: cms_nginx
    restart: unless-stopped
    tty: true
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - cms_network

  # React Frontend (Vite Dev Server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cms_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - webserver
    networks:
      - cms_network

  # phpMyAdmin Utility
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cms_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-root}"
    depends_on:
      - mysql
    networks:
      - cms_network

  # Cloudflare Tunnel for Deployment
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cms_cloudflared
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - frontend
      - webserver
    networks:
      - cms_network

networks:
  cms_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
